<script>
// ========== GLOBAL ==========
let allCategories = [];
let reversedVideos = [];
let latestCurrentPage = 0;
const LATEST_PER_PAGE = 10;
const AD_AFTER_EVERY = 5;
const MOBILE_AD_KEY = '28a19f677ddf30c65892eb4af1ddee10';
const AD_WIDTH = 320, AD_HEIGHT = 50;

// Native ad container ID
const NATIVE_CONTAINER_ID = 'container-dceead676280d8758acad3c44709124b';

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    }).substring(0, 60);
}

function generateVideoCard(video) {
    return `
    <div class="latest-card" data-video-id="${video.id}">
        <div class="thumb-container">
            <img class="thumb-img" src="Thumbs/${video.id}.webp" alt="${video.id}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumb'">
            ${video.preview ? `
            <video class="preview-video" muted loop playsinline preload="none" data-src="${video.preview}"></video>
            ` : ''}
            ${video.duration ? `<div class="duration">${video.duration}</div>` : ''}
        </div>
        <div class="latest-info">
            <div class="latest-id">${video.id}</div>
            ${video.title ? `<div class="latest-title">${escapeHtml(video.title)}</div>` : ''}
        </div>
    </div>`;
}

let currentActivePreview = null;

function stopPreview() {
    if (currentActivePreview) {
        const container = currentActivePreview.querySelector('.thumb-container');
        const previewVideo = container?.querySelector('.preview-video');
        const thumbImg = container?.querySelector('.thumb-img');
        if (previewVideo) {
            previewVideo.pause();
            previewVideo.style.display = 'none';
        }
        if (thumbImg) thumbImg.style.opacity = '1';
        currentActivePreview = null;
    }
}

function startPreview(card) {
    stopPreview();
    const container = card.querySelector('.thumb-container');
    const previewVideo = container?.querySelector('.preview-video');
    const thumbImg = container?.querySelector('.thumb-img');
    if (!previewVideo) return;
    if (!previewVideo.src && previewVideo.dataset.src) {
        previewVideo.src = previewVideo.dataset.src;
        previewVideo.load();
    }
    previewVideo.currentTime = 0;
    previewVideo.style.display = 'block';
    previewVideo.play().catch(e => console.log('Preview play failed:', e));
    if (thumbImg) thumbImg.style.opacity = '0.3';
    currentActivePreview = card;
}

function setupPreviewHandlers() {
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    container.addEventListener('mouseover', (e) => {
        const card = e.target.closest('.latest-card');
        if (!card) return;
        startPreview(card);
    });
    container.addEventListener('mouseout', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) stopPreview();
    });
    container.addEventListener('touchstart', (e) => {
        const card = e.target.closest('.latest-card');
        if (!card) return;
        startPreview(card);
    }, { passive: true });
    container.addEventListener('touchend', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) {
            setTimeout(() => {
                if (currentActivePreview === card) stopPreview();
            }, 100);
        }
    });
}

function renderLatestPage(page) {
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    if (!reversedVideos.length) {
        container.innerHTML = '<div class="no-videos-msg">✨ No videos available yet.</div>';
        document.getElementById('latestPagination').innerHTML = '';
        return;
    }
    const totalPages = Math.ceil(reversedVideos.length / LATEST_PER_PAGE);
    if (page < 0) page = 0;
    if (page >= totalPages) page = totalPages - 1;
    latestCurrentPage = page;
    const start = page * LATEST_PER_PAGE;
    const pageVideos = reversedVideos.slice(start, start + LATEST_PER_PAGE);
    
    const itemsHtml = [];
    const adSlots = [];
    
    for (let idx = 0; idx < pageVideos.length; idx++) {
        const video = pageVideos[idx];
        itemsHtml.push(generateVideoCard(video));
        if ((idx + 1) % AD_AFTER_EVERY === 0 && idx + 1 < pageVideos.length) {
            const adId = `inline_ad_latest_p${page}_idx${idx}`;
            adSlots.push(adId);
            itemsHtml.push(`<div class="ad-inline" id="${adId}"><div style="width:100%; max-width:320px; margin:0 auto;"></div></div>`);
        }
    }
    const finalHtml = `<div class="latest-video-row">${itemsHtml.join('')}</div>`;
    container.innerHTML = finalHtml;
    adSlots.forEach(adId => loadAdIntoElement(adId, MOBILE_AD_KEY, AD_WIDTH, AD_HEIGHT));
    document.querySelectorAll('.latest-card').forEach(card => {
        const videoId = card.getAttribute('data-video-id');
        if (videoId) {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                stopPreview();
                goToVideo(videoId);
            });
        }
    });
    updatePaginationControls(totalPages, page);
}

function updatePaginationControls(totalPages, currentPage) {
    const paginationDiv = document.getElementById('latestPagination');
    if (!paginationDiv) return;
    if (totalPages <= 1) {
        paginationDiv.innerHTML = '';
        return;
    }
    paginationDiv.innerHTML = `
        <button id="prevLatestBtn" ${currentPage === 0 ? 'disabled' : ''}>◀ PREV</button>
        <span class="page-info">Page ${currentPage+1} / ${totalPages}</span>
        <button id="nextLatestBtn" ${currentPage === totalPages-1 ? 'disabled' : ''}>NEXT ▶</button>
    `;
    document.getElementById('prevLatestBtn')?.addEventListener('click', () => {
        if (latestCurrentPage > 0) renderLatestPage(latestCurrentPage - 1);
    });
    document.getElementById('nextLatestBtn')?.addEventListener('click', () => {
        if (latestCurrentPage < totalPages-1) renderLatestPage(latestCurrentPage + 1);
    });
}

// UPDATED: new domain encyclopediainsoluble.com
function loadAdIntoElement(elementId, key, width, height) {
    const containerDiv = document.getElementById(elementId);
    if (!containerDiv) return;
    containerDiv.innerHTML = '<div style="min-height:50px; text-align:center;"></div>';
    delete window.atOptions;
    const s1 = document.createElement('script');
    s1.innerHTML = `var atOptions = {'key': '${key}','format': 'iframe','height': ${height},'width': ${width},'params': {}};`;
    const s2 = document.createElement('script');
    s2.src = 'https://encyclopediainsoluble.com/' + key + '/invoke.js?x=' + Math.random();
    s2.async = true;
    containerDiv.appendChild(s1);
    containerDiv.appendChild(s2);
}

async function loadCategories() {
    try {
        const response = await fetch('categories.json');
        allCategories = await response.json();
        if (videos && videos.length) {
            allCategories.forEach(cat => {
                cat.videoCount = videos.filter(v => v.categories && v.categories.includes(cat.id)).length;
            });
        }
        displayCategories(allCategories);
        updateStats(allCategories);
    } catch (error) {
        console.log('No categories.json, generating from videos');
        allCategories = createDefaultCategories();
        displayCategories(allCategories);
        updateStats(allCategories);
    }
}

function createDefaultCategories() {
    const catMap = {};
    if (videos && videos.length) {
        videos.forEach(video => {
            if (video.categories && Array.isArray(video.categories)) {
                video.categories.forEach(catId => {
                    if (!catMap[catId]) {
                        catMap[catId] = { id: catId, name: catId.charAt(0).toUpperCase() + catId.slice(1), thumbnail: `Thumbs/${video.id}.webp`, videoCount: 0 };
                    }
                });
            }
        });
        Object.keys(catMap).forEach(catId => {
            catMap[catId].videoCount = videos.filter(v => v.categories && v.categories.includes(catId)).length;
        });
        if (Object.keys(catMap).length) return Object.values(catMap);
           }
    return [
        { id: 'indian', name: '🇮🇳 Indian', thumbnail: 'Thumbs/HM001.webp', videoCount: videos?.length || 0 },
        { id: 'foreign', name: '🌍 Foreign', thumbnail: 'Thumbs/Movie001.webp', videoCount: 0 }
    ];
}

function setupSearch() {
    const input = document.getElementById('searchInput');
    const resultsDiv = document.getElementById('searchResults');
    input.addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        if (q.length < 2) { resultsDiv.style.display = 'none'; return; }
        if (!videos) return;
        const words = q.split(/\s+/).filter(w => w.length > 1);
        const filtered = videos.filter(v => {
            if (v.id.toLowerCase().includes(q)) return true;
            if (v.title && v.title.toLowerCase().includes(q)) return true;
            if (v.categories && v.categories.some(c => c.toLowerCase().includes(q))) return true;
            if (words.length > 1) {
                const text = [v.id, v.title || '', (v.categories || []).join(' ')].join(' ').toLowerCase();
                return words.every(w => text.includes(w));
            }
            return false;
        });
        if (filtered.length === 0) {
            resultsDiv.innerHTML = `<div class="search-no-results" style="padding:15px;">No videos for "${q}"</div>`;
            resultsDiv.style.display = 'block';
            return;
        }
        let html = '';
        filtered.forEach(v => {
            let catNames = '';
            if (v.categories && allCategories.length) {
                catNames = v.categories.map(cid => { let cat = allCategories.find(c => c.id === cid); return cat ? cat.name : cid; }).join(', ');
            } else if (v.categories) catNames = v.categories.join(', ');
            html += `<div class="search-result-item" onclick="goToVideo('${v.id}')">
                <div class="search-video-id">${v.id}</div>
                ${v.title ? `<div class="search-video-title">${escapeHtml(v.title)}</div>` : ''}
                <div class="search-video-cats">${catNames || 'uncategorized'}</div>
            </div>`;
        });
        resultsDiv.innerHTML = html;
        resultsDiv.style.display = 'block';
    });
    document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !resultsDiv.contains(e.target)) resultsDiv.style.display = 'none';
    });
}

function getRandomDelay() {
    const minDelay = 120000;
    const maxDelay = 240000;
    return Math.floor(Math.random() * (maxDelay - minDelay + 1) + minDelay);
}

function scheduleRefresh() {
    if(refreshTimer) clearTimeout(refreshTimer);
    if(refreshCount >= MAX_REFRESHES) return;
    const delay = getRandomDelay();
    refreshTimer = setTimeout(() => {
        if(refreshCount < MAX_REFRESHES && isUserActive && !document.hidden) {
            loadAllAds();
            refreshCount++;
            if(refreshCount < MAX_REFRESHES) scheduleRefresh();
        }
    }, delay);
}

function resetAndStart() {
    if(refreshCount >= MAX_REFRESHES) return;
    if(refreshTimer) clearTimeout(refreshTimer);
    scheduleRefresh();
}

let inactivityTimer = null;
function resetInactivityTimer() {
    isUserActive = true;
    lastActivity = Date.now();
    if(inactivityTimer) clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => { isUserActive = false; }, 300000);
}

const activityEvents = ['mousedown', 'mousemove', 'scroll', 'touchstart', 'click', 'keydown'];
activityEvents.forEach(event => {
    document.addEventListener(event, () => {
        resetInactivityTimer();
        resetAndStart();
    }, { passive: true });
});

document.addEventListener('visibilitychange', () => {
    if(!document.hidden && isUserActive) resetAndStart();
});

loadAllAds();
resetInactivityTimer();
scheduleRefresh();

function isInstagram() { return /Instagram/i.test(navigator.userAgent); }
function openExternal(url) {
    if (isInstagram()) {
        const cleanUrl = url.replace(/^https?:\/\//, '');
        window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;action=android.intent.action.VIEW;end";

}
