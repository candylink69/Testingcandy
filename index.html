<style>
/* ========== RESET & BASE ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0b0b0b;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    text-align: center;
    padding-bottom: 70px;
}
.container { max-width: 1200px; margin: 0 auto; padding: 8px 12px 20px; }

/* ========== 4K SHARPNESS (RETAINED) ========== */
img, .thumb-img, .category-thumb, .trending-thumb {
    image-rendering: crisp-edges;
    image-rendering: -webkit-optimize-contrast;
    transform: translateZ(0);
}
.thumb-img, .category-thumb { filter: contrast(1.08) saturate(1.15) brightness(1.02); }
body, .category-name, .video-title, .latest-id, .trending-title, .stat-number, .stat-label, .tab-btn, .page-info, .social-text {
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

/* ========== BLINKING TITLE (ORIGINAL SIZE) ========== */
.title {
    font-size: 22px;
    font-weight: bold;
    margin: 0 0 8px 0;
    padding: 10px;
    border-radius: 12px;
    background: rgba(0,0,0,0.7);
    border: 3px solid;
    text-shadow: 0 0 10px currentColor;
    animation: blinkColors 2s infinite alternate, pulseLight 1.5s infinite alternate;
}
@keyframes blinkColors {
    0% {color:#ff2d55; border-color:#ff2d55;}
    14% {color:#ff5500;}
    28% {color:#ffaa00;}
    42% {color:#ffff00;}
    57% {color:#00ff88;}
    71% {color:#0088ff;}
    85% {color:#aa55ff;}
    100% {color:#ff2d55;}
}
@keyframes pulseLight {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
}

/* ========== SOCIAL ICONS (CHHOTE, TEXT ABOVE) ========== */
.social-text {
    font-size: 10px;
    color: #ffcc88;
    margin: 5px 0 2px;
}
.social-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 2px 0 10px;
}
.social-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #222;
    color: white;
    font-size: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    transition: 0.2s;
}
.social-icon:active { transform: translateY(2px); }
.social-icon.instagram { background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
.social-icon.telegram { background: #0088cc; }
.social-icon.facebook { background: #1877f2; }
.social-icon:hover { transform: translateY(-2px); filter: brightness(1.05); }

/* ========== STICKY SEARCH ========== */
.sticky-search {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #0b0b0b;
    padding: 5px 0 8px;
    margin: 0 -12px;
    padding-left: 12px;
    padding-right: 12px;
}
.search-container {
    max-width: 600px;
    margin: 0 auto;
    position: relative;
}
.search-box {
    width: 100%;
    padding: 8px 15px 8px 40px;
    font-size: 13px;
    border-radius: 30px;
    border: 2px solid #ff3300;
    background: rgba(255,255,255,0.1);
    color: white;
    outline: none;
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23ff9900" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>');
    background-repeat: no-repeat;
    background-position: 15px center;
}
.search-box:focus { box-shadow: 0 0 12px rgba(255,51,0,0.6); background: rgba(255,255,255,0.15); }
#searchResults {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #111;
    border-radius: 12px;
    margin-top: 4px;
    max-height: 300px;
    overflow-y: auto;
    z-index: 1000;
    display: none;
}
.search-result-item { padding: 10px 12px; border-bottom: 1px solid #333; cursor: pointer; text-align: left; }
.search-result-item:hover { background: rgba(255,51,0,0.15); }
.search-video-id { color: #ff9900; font-weight: bold; font-size: 12px; }

/* ========== TABS + UNDERLINE ========== */
.tabs-wrapper { margin: 10px 0 5px; }
.tabs-container { display: flex; justify-content: center; gap: 8px; flex-wrap: nowrap; }
.tab-btn {

}
.tab-btn.active { color: #ffcc00; }
.tab-btn.active::after {
    content: '';

    bottom: -3px;
    left: 10%;

}
.tabs-underline {
    height: 1px;

}

/* ========== STATS BAR (TIGHT) ========== */
.stats-bar {

.stat-item { text-align: center; padding: 2px 8px; }
.stat-number { font-size: 16px; font-weight: bold; color: #ff9900; }
.stat-label { font-size: 10px; color: #aaa; margin-top: 1px; }

/* ========== PANELS ========== */
.panel { display: none; animation: fadeIn 0.2s; }
.panel.active-panel { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ========== CATEGORIES GRID (UNCHANGED - 2 COLUMNS) ========== */
.categories-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin: 10px 0;
}
.category-card {
    background: rgba(255,255,255,0.05);
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid #333;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}
.category-card:hover { border-color: #ff3300; transform: translateY(-3px); box-shadow: 0 10px 25px -8px rgba(255,51,0,0.4); }
.category-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
.category-name { padding: 10px; font-size: 15px; font-weight: bold; color: #ffcc00; background: rgba(0,0,0,0.8); }
.video-count { position: absolute; top: 6px; right: 6px; background: rgba(255,51,0,0.9); color: white; padding: 2px 7px; border-radius: 15px; font-size: 10px; font-weight: bold; }

/* ========== TRENDING GRID ========== */
.trending-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
    margin: 10px 0;
}
.trending-item {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #444;
    cursor: pointer;
    transition: 0.2s;
}
.trending-item:hover { border-color: #ff6600; transform: translateY(-3px); }
.trending-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
.trending-title { padding: 7px; font-size: 12px; color: #fff; }
.native-trending-card {

.native-thumb { width: 100%; aspect-ratio: 16/9; background: #1a1a1a; }

/* ========== LATEST VIDEOS GRID ========== */
.latest-grid { margin: 10px 0; }
.latest-video-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
}
/* Desktop: 2 columns */
@media (min-width: 768px) {
    .latest-video-row { grid-template-columns: repeat(2, 1fr); }
}
.latest-card {

.thumb-container {

.thumb-img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
.preview-video {

}
.latest-title {

    /* Allow multiline, no cutting */
}
.ad-inline {
    background: #000000cc;
    border-radius: 10px;
    min-height: 55px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 5px 0;

/* ========== PAGINATION ========== */
.pagination-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin: 15px 0 10px;
}
.pagination-btn {
    background: #ff3300;
    border: none;
    color: white;
    padding: 6px 18px;
    font-size: 13px;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.2s;
}
.pagination-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
.pagination-btn:hover:not(:disabled) { background: #ff6600; transform: scale(1.02); }
.page-info { background: #222; padding: 5px 15px; border-radius: 30px; font-size: 13px; color: #ffaa66; }

/* ========== AD CONTAINERS ========== */
.ad-spot { margin: 8px 0; text-align: center; min-height: 50px; }
#sticky {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    background: #000;
    z-index: 9999;
    min-height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 640px) {
    .tab-btn { padding: 6px 14px; font-size: 13px; }
    .stat-number { font-size: 14px; }
    .title { font-size: 20px; }
    .social-icon { width: 28px; height: 28px; font-size: 16px; }
    .latest-title { font-size: 11px; }
}
</style>

<script>
// ========== GLOBALS ==========
let allCategories = [];
let reversedVideos = [];
let latestCurrentPage = 0;
const LATEST_PER_PAGE = 20;          // ✅ Changed from 10 to 20
const AD_AFTER_EVERY = 5;
const SWIPE_THRESHOLD = 60;           // ✅ Balanced threshold

// Ad Keys (NEW)
const KEY_320x50 = '56b3e3a26900c426b81430f9f85a31d6';
const KEY_300x250 = '8e09ed2a29423c808ccb93e333fa00c5';
const KEY_728x90 = '57e196c0c8406efacc614d4b4d21d13d';

let currentTab = 'latest';

// Helper functions
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')).substring(0, 80);
}

// Load standard ads (top, bottom, sticky)
function loadAd(containerId, key, width, height) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    delete window.atOptions;
    const s1 = document.createElement('script');
    s1.innerHTML = `var atOptions = {'key': '${key}','format': 'iframe','height': ${height},'width': ${width},'params': {}};`;
    const s2 = document.createElement('script');
    s2.src = 'https://encyclopediainsoluble.com/' + key + '/invoke.js?x=' + Math.random();
    s2.async = true;
    container.appendChild(s1);
    container.appendChild(s2);
}

function loadAllAds() {
    const isMobile = window.innerWidth < 768;
    if (isMobile) {
        loadAd('ad-top', KEY_320x50, 320, 50);
        loadAd('ad-bottom', KEY_300x250, 300, 250);
        loadAd('sticky', KEY_320x50, 320, 50);
    } else {
        loadAd('ad-top', KEY_728x90, 728, 90);
        loadAd('ad-bottom', KEY_728x90, 728, 90);
        loadAd('sticky', KEY_320x50, 320, 50);
    }
}

// Inline ad loader (for latest grid)
function loadInlineAd(elementId) {
    const el = document.getElementById(elementId);
    if (!el) return;
    el.innerHTML = '<div style="min-height:50px;"></div>';
    delete window.atOptions;
    const s1 = document.createElement('script');
    s1.innerHTML = `var atOptions = {'key': '${KEY_320x50}','format': 'iframe','height': 50,'width': 320,'params': {}};`;
    const s2 = document.createElement('script');
    s2.src = 'https://encyclopediainsoluble.com/' + KEY_320x50 + '/invoke.js?x=' + Math.random();
    s2.async = true;
    el.appendChild(s1);
    el.appendChild(s2);
}

// Generate video card (with preview support)
function generateVideoCard(video) {
    return `
    <div class="latest-card" data-video-id="${video.id}">
        <div class="thumb-container">
            <img class="thumb-img" src="${getThumbnailUrl(video.id)}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumb'">
            ${video.preview ? `<video class="preview-video" muted loop playsinline preload="none" data-src="${video.preview}"></video>` : ''}
            ${video.duration ? `<div class="duration">${video.duration}</div>` : ''}
        </div>
        <div class="latest-info">
            <div class="latest-id">${video.id}</div>
            ${video.title ? `<div class="latest-title">${escapeHtml(video.title)}</div>` : ''}
        </div>
    </div>`;
}

// Preview handlers (fixed)
let currentActivePreview = null;
function stopPreview() {
    if (currentActivePreview) {
        const container = currentActivePreview.querySelector('.thumb-container');
        const previewVideo = container?.querySelector('.preview-video');
        const thumbImg = container?.querySelector('.thumb-img');
        if (previewVideo) { previewVideo.pause(); previewVideo.style.display = 'none'; }
        if (thumbImg) thumbImg.style.opacity = '1';
        currentActivePreview = null;
    }
}
function startPreview(card) {
    stopPreview();
    const container = card.querySelector('.thumb-container');
    const previewVideo = container?.querySelector('.preview-video');
    const thumbImg = container?.querySelector('.thumb-img');
    if (!previewVideo) return;
    if (!previewVideo.src && previewVideo.dataset.src) {
        previewVideo.src = previewVideo.dataset.src;
        previewVideo.load();
    }
    previewVideo.currentTime = 0;
    previewVideo.style.display = 'block';
    previewVideo.play().catch(e => console.log('Preview error:', e));
    if (thumbImg) thumbImg.style.opacity = '0.3';
    currentActivePreview = card;
}
function setupPreviewHandlers() {
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    // Remove old listeners to avoid duplicates (simple approach: replace)
    const newContainer = container.cloneNode(true);
    container.parentNode.replaceChild(newContainer, container);
    // Re-attach to new container
    const finalContainer = document.getElementById('latestDynamicGrid');
    if (!finalContainer) return;
    finalContainer.addEventListener('mouseover', (e) => {
        const card = e.target.closest('.latest-card');
        if (card) startPreview(card);
    });
    finalContainer.addEventListener('mouseout', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) stopPreview();
    });
    // For touch devices
    finalContainer.addEventListener('touchstart', (e) => {
        const card = e.target.closest('.latest-card');
        if (card) startPreview(card);
    }, { passive: true });
    finalContainer.addEventListener('touchend', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) {
            setTimeout(() => { if (currentActivePreview === card) stopPreview(); }, 200);
                    }
    });
}

// Render latest page (20 per page)
function renderLatestPage(page, scrollToTop = true) {
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    if (!reversedVideos.length) {
        container.innerHTML = '<div class="no-videos-msg">✨ No videos available yet.</div>';
        document.getElementById('latestPaginationTop').innerHTML = '';
        document.getElementById('latestPaginationBottom').innerHTML = '';
        return;
    }
    const totalPages = Math.ceil(reversedVideos.length / LATEST_PER_PAGE);
    if (page < 0) page = 0;
    if (page >= totalPages) page = totalPages - 1;
    latestCurrentPage = page;
    const start = page * LATEST_PER_PAGE;
    const pageVideos = reversedVideos.slice(start, start + LATEST_PER_PAGE);
    
    const itemsHtml = [];
    const adSlots = [];
    for (let idx = 0; idx < pageVideos.length; idx++) {
        itemsHtml.push(generateVideoCard(pageVideos[idx]));
        if ((idx + 1) % AD_AFTER_EVERY === 0 && idx + 1 < pageVideos.length) {
            const adId = `inline_ad_${Date.now()}_${idx}_${Math.random()}`;
            adSlots.push(adId);
            itemsHtml.push(`<div class="ad-inline" id="${adId}"><div style="width:100%; max-width:320px; margin:0 auto;"></div></div>`);
        }
    }
    container.innerHTML = `<div class="latest-video-row">${itemsHtml.join('')}</div>`;
    adSlots.forEach(adId => loadInlineAd(adId));
    
    // Attach click handlers
    document.querySelectorAll('.latest-card').forEach(card => {
        const videoId = card.getAttribute('data-video-id');
        if (videoId) {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                stopPreview();
                goToVideo(videoId);
            });
        }
    });
    updatePaginationControls(totalPages, page);
    setupPreviewHandlers(); // re-attach preview after DOM update
    if (scrollToTop) window.scrollTo({ top: 0, behavior: 'instant' });
}

function updatePaginationControls(totalPages, currentPage) {
    const topDiv = document.getElementById('latestPaginationTop');
    const bottomDiv = document.getElementById('latestPaginationBottom');
    if (totalPages <= 1) {
        if (topDiv) topDiv.innerHTML = '';
        if (bottomDiv) bottomDiv.innerHTML = '';
        return;
    }
    const html = `<button class="pagination-btn" id="prevLatestBtn" ${currentPage === 0 ? 'disabled' : ''}>◀ PREV</button>
                  <span class="page-info">${currentPage+1} / ${totalPages}</span>
                  <button class="pagination-btn" id="nextLatestBtn" ${currentPage === totalPages-1 ? 'disabled' : ''}>NEXT ▶</button>`;
    if (topDiv) topDiv.innerHTML = html;
    if (bottomDiv) bottomDiv.innerHTML = html;
    
    // Attach events (clean previous by removing old and adding new)
    const prevBtn = document.getElementById('prevLatestBtn');
    const nextBtn = document.getElementById('nextLatestBtn');
    if (prevBtn) {
        prevBtn.replaceWith(prevBtn.cloneNode(true));
        document.getElementById('prevLatestBtn')?.addEventListener('click', () => {
            if (latestCurrentPage > 0) renderLatestPage(latestCurrentPage - 1, true);
        });
    }
    if (nextBtn) {
        nextBtn.replaceWith(nextBtn.cloneNode(true));
        document.getElementById('nextLatestBtn')?.addEventListener('click', () => {
            if (latestCurrentPage < totalPages-1) renderLatestPage(latestCurrentPage + 1, true);
        });
    }
}

// Categories (unchanged logic)
async function loadCategories() {
    try {
        const res = await fetch('categories.json');
        allCategories = await res.json();
        if (videos) allCategories.forEach(cat => cat.videoCount = videos.filter(v => v.categories?.includes(cat.id)).length);
        displayCategories(allCategories);
    } catch(e) {
        allCategories = createDefaultCategories();
        displayCategories(allCategories);
    }
    updateStatsBar();
}
function createDefaultCategories() {
    const map = {};
    if (videos) videos.forEach(v => {
        if (Array.isArray(v.categories)) v.categories.forEach(c => {
            if (!map[c]) map[c] = { id: c, name: c[0].toUpperCase()+c.slice(1), thumbnail: `Thumbs/${v.id}.webp`, videoCount: 0 };
        });
    });
    Object.keys(map).forEach(c => map[c].videoCount = videos.filter(v => v.categories?.includes(c)).length);
    if (Object.keys(map).length) return Object.values(map);
    return [{ id: 'indian', name: '🇮🇳 Indian', thumbnail: 'Thumbs/HM001.webp', videoCount: videos?.length || 0 }];
}
function displayCategories(cats) {
    const cont = document.getElementById('categoriesContainer');
    if (!cont) return;
    cont.innerHTML = '';
    cats.forEach(cat => {
        const cnt = videos?.filter(v => v.categories?.includes(cat.id)).length || 0;
        cont.innerHTML += `<div class="category-card" onclick="selectCategory('${cat.id}')">
            <img src="${cat.thumbnail}" class="category-thumb" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'">
            <div class="video-count">${cnt} videos</div>
            <div class="category-name">${cat.name}</div>
        </div>`;
    });
}

// Trending (with native ad)
function loadTrendingVideos() {
    const cont = document.getElementById('trendingContainer');
    if (!cont) return;
    cont.innerHTML = '';
    const trendingIds = ["Movie006","Movie005","HM002","D001"];
    const trendingVideos = videos?.filter(v => trendingIds.includes(v.id)) || [];
    // Native ad card
    const nativeCard = document.createElement('div');
    nativeCard.className = 'native-trending-card';
    nativeCard.innerHTML = `<div class="native-thumb"><div id="container-4b10501c070917e2ceca3f13f9e60117" style="width:100%;height:100%;"></div></div><div class="native-title">Sponsored</div>`;
    cont.appendChild(nativeCard);
    const script = document.createElement('script');
    script.async = true;
    script.setAttribute('data-cfasync', 'false');
    script.src = 'https://encyclopediainsoluble.com/4b10501c070917e2ceca3f13f9e60117/invoke.js';
    document.body.appendChild(script);
    trendingVideos.forEach(v => {
        cont.innerHTML += `<div class="trending-item" onclick="goToVideo('${v.id}')">
            <img src="${getThumbnailUrl(v.id)}" class="trending-thumb" onerror="this.src='https://via.placeholder.com/200x120?text=No+Thumb'">
            <div class="trending-title">${v.id}</div>
        </div>`;
    });
}

// Stats Bar dynamic
function updateStatsBar() {
    const sb = document.getElementById('statsBar');
    if (!sb) return;
    const totalVideos = videos?.length || 0;
    const totalCategories = allCategories?.length || 0;
    const trendingCount = Math.min(4, videos?.length || 0);
    if (currentTab === 'latest') {
        sb.innerHTML = `<div class="stat-item"><div class="stat-number">${totalVideos}</div><div class="stat-label">Total Videos</div></div>
                        <div class="stat-item"><div class="stat-number">${totalCategories}</div><div class="stat-label">Categories</div></div>
                        <div class="stat-item"><div class="stat-number">${trendingCount}</div><div class="stat-label">Trending</div></div>`;
    } else if (currentTab === 'categories') {
        sb.innerHTML = `<div class="stat-item"><div class="stat-number">${totalCategories}</div><div class="stat-label">Total Categories</div></div>`;
    } else {
        sb.innerHTML = `<div class="stat-item"><div class="stat-number">${trendingCount}</div><div class="stat-label">Trending Videos</div></div>`;
    }
}

// Tab switching
function switchTab(tabId) {
    currentTab = tabId;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        if (btn.getAttribute('data-tab') === tabId) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    document.getElementById('latestPanel').classList.toggle('active-panel', tabId === 'latest');
    document.getElementById('categoriesPanel').classList.toggle('active-panel', tabId === 'categories');
    document.getElementById('trendingPanel').classList.toggle('active-panel', tabId === 'trending');
    updateStatsBar();
    if (tabId === 'latest' && reversedVideos.length && !document.getElementById('latestDynamicGrid').innerHTML) {
        renderLatestPage(0, false);
    }
    if (tabId === 'categories' && allCategories.length) {
        displayCategories(allCategories);
    }
    if (tabId === 'trending') {
        loadTrendingVideos();
    }
}

// Search
function setupSearch() {
    const input = document.getElementById('searchInput');
    const resultsDiv = document.getElementById('searchResults');
    input.addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        if (q.length < 2) { resultsDiv.style.display = 'none'; return; }
        if (!videos) return;
        const filtered = videos.filter(v => v.id.toLowerCase().includes(q) || (v.title && v.title.toLowerCase().includes(q)) || (v.categories && v.categories.some(c => c.toLowerCase().includes(q))));
        if (filtered.length === 0) {
            resultsDiv.innerHTML = '<div style="padding:15px;">No videos found</div>';
            resultsDiv.style.display = 'block';
            return;
        }
        let html = '';
        filtered.forEach(v => {
            html += `<div class="search-result-item" onclick="goToVideo('${v.id}')">
                        <div class="search-video-id">${v.id}</div>
                        ${v.title ? `<div class="search-video-title">${escapeHtml(v.title)}</div>` : ''}
                    </div>`;
        });
        resultsDiv.innerHTML = html;
        resultsDiv.style.display = 'block';
    });
    document.addEventListener('click', (e) => {
        if (!input.contains(e.target) && !resultsDiv.contains(e.target)) resultsDiv.style.display = 'none';
    });
}

// Swipe (threshold 60px)
let touchStartX = 0;
function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
function handleTouchEnd(e) {
    const diff = e.changedTouches[0].screenX - touchStartX;
    const tabs = ['latest', 'categories', 'trending'];
    const idx = tabs.indexOf(currentTab);
    if (Math.abs(diff) > SWIPE_THRESHOLD) {
        if (diff > 0 && idx > 0) switchTab(tabs[idx-1]);
        else if (diff < 0 && idx < tabs.length-1) switchTab(tabs[idx+1]);
    }
}

// Ad refresh system
let refreshCount = 0, refreshTimer = null, isUserActive = true;
function scheduleRefresh() {
    if (refreshTimer) clearTimeout(refreshTimer);
    if (refreshCount >= 2) return;
    refreshTimer = setTimeout(() => {
        if (isUserActive && !document.hidden) {
            loadAllAds();
            refreshCount++;
            if (refreshCount < 2) scheduleRefresh();
        }
    }, 120000 + Math.random() * 120000);
}
function resetActivity() { isUserActive = true; }
setInterval(() => { isUserActive = false; }, 300000);
['mousedown','mousemove','scroll','touchstart','click','keydown'].forEach(ev => document.addEventListener(ev, resetActivity));
document.addEventListener('visibilitychange', () => { if (!document.hidden) scheduleRefresh(); });

function goToVideo(id) { window.location.href = `video.html?v=${id}`; }
function selectCategory(id) { localStorage.setItem('selectedCategory', id); window.location.href = `list.html?category=${id}`; }

// Initialization
document.addEventListener('DOMContentLoaded', () => {
    function check() {
        if (typeof videos !== 'undefined' && videos?.length) {
            reversedVideos = [...videos].reverse();
            loadCategories();
            loadTrendingVideos();
            setupSearch();
            renderLatestPage(0, false);
            updateStatsBar();
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
            });
            document.addEventListener('touchstart', handleTouchStart, { passive: true });
            document.addEventListener('touchend', handleTouchEnd, { passive: true });
        } else setTimeout(check, 100);
    }
    check();
    loadAllAds();
    scheduleRefresh();
});
</script>
