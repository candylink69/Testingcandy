<script>
// ========== GLOBAL VARIABLES ==========
let allCategories = [];
let reversedVideos = [];
let latestCurrentPage = 0;
const LATEST_PER_PAGE = 10;
const AD_AFTER_EVERY = 5;

// Ad Keys (NEW)
const KEY_320x50 = '56b3e3a26900c426b81430f9f85a31d6';
const KEY_300x250 = '8e09ed2a29423c808ccb93e333fa00c5';
const KEY_728x90 = '57e196c0c8406efacc614d4b4d21d13d';

// Current active tab
let currentTab = 'latest';

// ========== HELPER FUNCTIONS ==========
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    }).substring(0, 60);
}

function loadAdIntoElement(elementId, key, width, height) {
    const containerDiv = document.getElementById(elementId);
    if (!containerDiv) return;
    containerDiv.innerHTML = '<div style="min-height:50px; text-align:center;"></div>';
    delete window.atOptions;
    const s1 = document.createElement('script');
    s1.innerHTML = `var atOptions = {'key': '${key}','format': 'iframe','height': ${height},'width': ${width},'params': {}};`;
    const s2 = document.createElement('script');
    s2.src = 'https://encyclopediainsoluble.com/' + key + '/invoke.js?x=' + Math.random();
    s2.async = true;
    containerDiv.appendChild(s1);
    containerDiv.appendChild(s2);
}

// ========== VIDEO CARD GENERATION ==========
function generateVideoCard(video) {
    return `
    <div class="latest-card" data-video-id="${video.id}">
        <div class="thumb-container">
            <img class="thumb-img" src="${getThumbnailUrl(video.id)}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumb'">
            ${video.preview ? `<video class="preview-video" muted loop playsinline preload="none" data-src="${video.preview}"></video>` : ''}
            ${video.duration ? `<div class="duration">${video.duration}</div>` : ''}
        </div>
        <div class="latest-info">
            <div class="latest-id">${video.id}</div>
            ${video.title ? `<div class="latest-title">${escapeHtml(video.title)}</div>` : ''}
        </div>
    </div>`;
}

// Preview handlers
let currentActivePreview = null;

function stopPreview() {
    if (currentActivePreview) {
        const container = currentActivePreview.querySelector('.thumb-container');
        const previewVideo = container?.querySelector('.preview-video');
        const thumbImg = container?.querySelector('.thumb-img');
        if (previewVideo) {
            previewVideo.pause();
            previewVideo.style.display = 'none';
        }
        if (thumbImg) thumbImg.style.opacity = '1';
        currentActivePreview = null;
    }
}

function startPreview(card) {
    stopPreview();
    const container = card.querySelector('.thumb-container');
    const previewVideo = container?.querySelector('.preview-video');
    const thumbImg = container?.querySelector('.thumb-img');
    if (!previewVideo) return;
    if (!previewVideo.src && previewVideo.dataset.src) {
        previewVideo.src = previewVideo.dataset.src;
        previewVideo.load();
    }
    previewVideo.currentTime = 0;
    previewVideo.style.display = 'block';
    previewVideo.play().catch(e => console.log('Preview error:', e));
    if (thumbImg) thumbImg.style.opacity = '0.3';
    currentActivePreview = card;
}

function setupPreviewHandlers() {
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    container.addEventListener('mouseover', (e) => {
        const card = e.target.closest('.latest-card');
        if (card) startPreview(card);
    });
    container.addEventListener('mouseout', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) stopPreview();
    });
    container.addEventListener('touchstart', (e) => {
        const card = e.target.closest('.latest-card');
        if (card) startPreview(card);
    }, { passive: true });
    container.addEventListener('touchend', (e) => {
        const card = e.target.closest('.latest-card');
        if (card && currentActivePreview === card) {
            setTimeout(() => { if (currentActivePreview === card) stopPreview(); }, 100);
        }
    });
}

// ========== LATEST VIDEOS RENDERING ==========
function renderLatestPage(page, scrollToTop = true) {
    const container = document.getElementById('latestDynamicGrid');
    if (!container) return;
    if (!reversedVideos.length) {
        container.innerHTML = '<div class="no-videos-msg">✨ No videos available yet.</div>';
        document.getElementById('latestPaginationTop').innerHTML = '';
        document.getElementById('latestPaginationBottom').innerHTML = '';
        return;
    }
     const totalPages = Math.ceil(reversedVideos.length / LATEST_PER_PAGE);
    if (page < 0) page = 0;
    if (page >= totalPages) page = totalPages - 1;
    latestCurrentPage = page;
    const start = page * LATEST_PER_PAGE;
    const pageVideos = reversedVideos.slice(start, start + LATEST_PER_PAGE);
    
    const itemsHtml = [];
    const adSlots = [];
    
    for (let idx = 0; idx < pageVideos.length; idx++) {
        const video = pageVideos[idx];
        itemsHtml.push(generateVideoCard(video));
        if ((idx + 1) % AD_AFTER_EVERY === 0 && idx + 1 < pageVideos.length) {
            const adId = `inline_ad_${Date.now()}_${idx}`;
            adSlots.push(adId);
            itemsHtml.push(`<div class="ad-inline" id="${adId}"><div style="width:100%; max-width:320px; margin:0 auto;"></div></div>`);
        }
    }
    const finalHtml = `<div class="latest-video-row">${itemsHtml.join('')}</div>`;
    container.innerHTML = finalHtml;
    
    adSlots.forEach(adId => loadAdIntoElement(adId, KEY_320x50, 320, 50));
    
    document.querySelectorAll('.latest-card').forEach(card => {
        const videoId = card.getAttribute('data-video-id');
        if (videoId) {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                stopPreview();
                goToVideo(videoId);
            });
        }
    });
    
    updatePaginationControls(totalPages, page);
    setupPreviewHandlers();
    
    if (scrollToTop) {
        window.scrollTo({ top: 0, behavior: 'instant' });
    }
}

function updatePaginationControls(totalPages, currentPage) {
    const paginationTop = document.getElementById('latestPaginationTop');
    const paginationBottom = document.getElementById('latestPaginationBottom');
    
    if (totalPages <= 1) {
        paginationTop.innerHTML = '';
        paginationBottom.innerHTML = '';
        return;
    }
    
    const html = `
        <button class="pagination-btn" id="prevLatestBtn" ${currentPage === 0 ? 'disabled' : ''}>◀ PREV</button>
        <span class="page-info">Page ${currentPage+1} / ${totalPages}</span>
        <button class="pagination-btn" id="nextLatestBtn" ${currentPage === totalPages-1 ? 'disabled' : ''}>NEXT ▶</button>
    `;
    paginationTop.innerHTML = html;
    paginationBottom.innerHTML = html;
    
    document.getElementById('prevLatestBtn')?.addEventListener('click', () => {
        if (latestCurrentPage > 0) renderLatestPage(latestCurrentPage - 1, true);
    });
    document.getElementById('nextLatestBtn')?.addEventListener('click', () => {
        if (latestCurrentPage < totalPages-1) renderLatestPage(latestCurrentPage + 1, true);
    });
}

// ========== CATEGORIES ==========
async function loadCategories() {
    try {
        const response = await fetch('categories.json');
        allCategories = await response.json();
        if (videos && videos.length) {
            allCategories.forEach(cat => {
                cat.videoCount = videos.filter(v => v.categories && v.categories.includes(cat.id)).length;
            });
        }
        displayCategories(allCategories);
    } catch (error) {
        allCategories = createDefaultCategories();
        displayCategories(allCategories);
    }
    updateStatsBar();
}

function createDefaultCategories() {
    const catMap = {};
    if (videos && videos.length) {
        videos.forEach(video => {
            if (video.categories && Array.isArray(video.categories)) {
                video.categories.forEach(catId => {
                    if (!catMap[catId]) {
                        catMap[catId] = { id: catId, name: catId.charAt(0).toUpperCase() + catId.slice(1), thumbnail: `Thumbs/${video.id}.webp`, videoCount: 0 };
                    }
                });
            }
        });
        Object.keys(catMap).forEach(catId => {
            catMap[catId].videoCount = videos.filter(v => v.categories && v.categories.includes(catId)).length;
        });
        if (Object.keys(catMap).length) return Object.values(catMap);
    }
    return [
        { id: 'indian', name: '🇮🇳 Indian', thumbnail: 'Thumbs/HM001.webp', videoCount: videos?.length || 0 },
        { id: 'foreign', name: '🌍 Foreign', thumbnail: 'Thumbs/Movie001.webp', videoCount: 0 }
    ];
}

function displayCategories(categories) {
    const container = document.getElementById('categoriesContainer');
    container.innerHTML = '';
    categories.forEach(cat => {
        const cnt = videos ? videos.filter(v => v.categories && v.categories.includes(cat.id)).length : 0;
        container.innerHTML += `<div class="category-card" onclick="selectCategory('${cat.id}')">
            <img src="${cat.thumbnail}" alt="${cat.name}" class="category-thumb" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180?text=No+Image'">
            <div class="video-count">${cnt} videos</div>
            <div class="category-name">${cat.name}</div>
        </div>`;
    });
}

// ========== TRENDING ==========
function loadTrendingVideos() {
    const container = document.getElementById('trendingContainer');
    if (!container) return;
    container.innerHTML = '';
    const TRENDING_IDS = ["Movie006", "Movie005", "HM002", "D001"];
    if (!videos) return;
    const trendingVideos = videos.filter(v => TRENDING_IDS.includes(v.id));
    
    // Native ad card
    const nativeCard = document.createElement('div');
    nativeCard.className = 'native-trending-card';
    nativeCard.innerHTML = `
        <div class="native-thumb">
            <div id="container-4b10501c070917e2ceca3f13f9e60117" style="width:100%;height:100%;"></div>
        </div>
        <div class="native-title">Sponsored</div>
    `;
    container.appendChild(nativeCard);
    
    const script = document.createElement('script');
    script.async = true;
    script.setAttribute('data-cfasync', 'false');
    script.src = 'https://encyclopediainsoluble.com/4b10501c070917e2ceca3f13f9e60117/invoke.js';
    document.body.appendChild(script);
    
    trendingVideos.forEach(video => {
        container.innerHTML += `<div class="trending-item" onclick="goToVideo('${video.id}')">
            <img src="${getThumbnailUrl(video.id)}" class="trending-thumb" onerror="this.src='https://via.placeholder.com/200x120?text=No+Thumb'">
            <div class="trending-title">${video.id}</div>
        </div>`;
    });
}

// ========== STATS BAR (DYNAMIC) ==========
function updateStatsBar() {
    const statsBar = document.getElementById('statsBar');
    if (!statsBar) return;
    
    const totalVideos = videos?.length || 0;
    const totalCategories = allCategories?.length || 0;
    const trendingCount = Math.min(4, videos?.length || 0);
    
    if (currentTab === 'latest') {
        statsBar.innerHTML = `
            <div class="stat-item"><div class="stat-number">${totalVideos}</div><div class="stat-label">Total Videos</div></div>
            <div class="stat-item"><div class="stat-number">${totalCategories}</div><div class="stat-label">Categories</div></div>
            <div class="stat-item"><div class="stat-number">${trendingCount}</div><div class="stat-label">Trending</div></div>
        `;
    } else if (currentTab === 'categories') {
        statsBar.innerHTML = `
            <div class="stat-item"><div class="stat-number">${totalCategories}</div><div class="stat-label">Total Categories</div></div>
        `;
    } else if (currentTab === 'trending') {
        statsBar.innerHTML = `
            <div class="stat-item"><div class="stat-number">${trendingCount}</div><div class="stat-label">Trending Videos</div></div>
        `;
    }
}

// ========== TAB SWITCHING ==========
function switchTab(tabId) {
    currentTab = tabId;
    
    // Update buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
        if (btn.getAttribute('data-tab') === tabId) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    
    // Update panels
    document.getElementById('latestPanel').classList.toggle('active-panel', tabId === 'latest');
    document.getElementById('categoriesPanel').classList.toggle('active-panel', tabId === 'categories');
    document.getElementById('trendingPanel').classList.toggle('active-panel', tabId === 'trending');
    
    // Update stats bar
    updateStatsBar();
    
    // Refresh content if needed
    if (tabId === 'latest' && reversedVideos.length && !document.getElementById('latestDynamicGrid').innerHTML) {
        renderLatestPage(0, false);
    }
    if (tabId === 'categories' && allCategories.length) {
        displayCategories(allCategories);
    }
    if (tabId === 'trending') {
        loadTrendingVideos();
    }
}

// ========== SEARCH ==========
function setupSearch() {
    const input = document.getElementById('searchInput');
    const resultsDiv = document.getElementById('searchResults');
    input.addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        if (q.length < 2) { resultsDiv.style.display = 'none'; return; }
        if (!videos) return;
        const filtered = videos.filter(v => {
            if (v.id.toLowerCase().includes(q)) return true;
            if (v.title && v.title.toLowerCase().includes(q)) return true;
            if (v.categories && v.categories.some(c => c.toLowerCase().includes(q))) return true;
            return false;
        });
        if (filtered.length === 0) {
            resultsDiv.innerHTML = `<div class="search-no-results" style="padding:15px;">No videos for "${q}"</div>`;
            resultsDiv.style.display = 'block';
            return;
        }
        let html = '';
        filtered.forEach(v => {
            html += `<div class="search-result-item" onclick="goToVideo('${v.id}')">
                <div class="search-video-id">${v.id}</div>
                ${v.title ? `<div class="search-video-title">${escapeHtml(v.title)}</div>` : ''}
            </div>`;
        });
        resultsDiv.innerHTML = html;
        resultsDiv.style.display = 'block';
    });
    document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !resultsDiv.contains(e.target)) resultsDiv.style.display = 'none';
    });
}

// ========== SWIPE SUPPORT ==========
let touchStartX = 0;
let touchEndX = 0;

function handleTouchStart(e) {
    touchStartX = e.changedTouches[0].screenX;
}

function handleTouchEnd(e) {
    touchEndX = e.changedTouches[0].screenX;
    const swipeDistance = touchEndX - touchStartX;
    const tabs = ['latest', 'categories', 'trending'];
    const currentIndex = tabs.indexOf(currentTab);
    
    if (Math.abs(swipeDistance) > 50) {
        if (swipeDistance > 0 && currentIndex > 0) {
            switchTab(tabs[currentIndex - 1]);
        } else if (swipeDistance < 0 && currentIndex < tabs.length - 1) {
            switchTab(tabs[currentIndex + 1]);
        }
    }
}

// ========== ADS SYSTEM ==========
let refreshCount = 0;
const MAX_REFRESHES = 2;
let lastActivity = Date.now();
let isUserActive = true;
let refreshTimer = null;

function loadAd(id, key, w, h) {
    let d = document.getElementById(id);
    if(!d) return;
    d.innerHTML = '';
    delete window.atOptions;
    let s1 = document.createElement('script');
    s1.innerHTML = `var atOptions = {'key': '${key}','format': 'iframe','height': ${h},'width': ${w},'params': {}};`;
    let s2 = document.createElement('script');
    s2.src = 'https://encyclopediainsoluble.com/' + key + '/invoke.js?x=' + Math.random();
    s2.async = true;
    d.appendChild(s1);
    d.appendChild(s2);
}

function loadAllAds() {
    if(window.innerWidth < 768) {
        loadAd('ad-top', KEY_320x50, 320, 50);
        loadAd('ad-bottom', KEY_300x250, 300, 250);
        loadAd('sticky', KEY_320x50, 320, 50);
    } else {
        loadAd('ad-top', KEY_728x90, 728, 90);
        loadAd('ad-bottom', KEY_728x90, 728, 90);
        loadAd('sticky', KEY_320x50, 320, 50);
    }
}

function getRandomDelay() {
    return Math.floor(Math.random() * (240000 - 120000 + 1) + 120000);
}

function scheduleRefresh() {
    if(refreshTimer) clearTimeout(refreshTimer);
    if(refreshCount >= MAX_REFRESHES) return;
    const delay = getRandomDelay();
    refreshTimer = setTimeout(() => {
        if(refreshCount < MAX_REFRESHES && isUserActive && !document.hidden) {
            loadAllAds();
            refreshCount++;
            if(refreshCount < MAX_REFRESHES) scheduleRefresh();
        }
    }, delay);
}

function resetAndStart() {
    if(refreshCount >= MAX_REFRESHES) return;
    if(refreshTimer) clearTimeout(refreshTimer);
    scheduleRefresh();
}

let inactivityTimer = null;
function resetInactivityTimer() {
    isUserActive = true;
    lastActivity = Date.now();
    if(inactivityTimer) clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => { isUserActive = false; }, 300000);
}

const activityEvents = ['mousedown', 'mousemove', 'scroll', 'touchstart', 'click', 'keydown'];
activityEvents.forEach(event => {
    document.addEventListener(event, () => {
        resetInactivityTimer();
        resetAndStart();
    }, { passive: true });
});

document.addEventListener('visibilitychange', () => {
    if(!document.hidden && isUserActive) resetAndStart();
});

// ========== NAVIGATION ==========
function goToVideo(videoId) { 
    window.location.href = `video.html?v=${videoId}`; 
}

function selectCategory(categoryId) {
    localStorage.setItem('selectedCategory', categoryId);
    window.location.href = `list.html?category=${categoryId}`;
}

// ========== INITIALIZATION ==========
document.addEventListener('DOMContentLoaded', function() {
    function checkVideosAndInit() {
        if (typeof videos !== 'undefined' && videos && videos.length) {
            reversedVideos = [...videos].reverse();
            loadCategories();
            loadTrendingVideos();
            setupSearch();
            renderLatestPage(0, false);
            updateStatsBar();
            
            // Tab click handlers
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
            });
            
            // Swipe handlers
            document.addEventListener('touchstart', handleTouchStart, { passive: true });
            document.addEventListener('touchend', handleTouchEnd, { passive: true });
        } else {
            setTimeout(checkVideosAndInit, 100);
        }
    }
    checkVideosAndInit();
    loadAllAds();
    resetInactivityTimer();
    scheduleRefresh();
});

window.selectCategory = selectCategory;
window.goToVideo = goToVideo;
window.renderLatestPage = renderLatestPage;
</script>
